<h1>{{h1}}</h1>
<ul>
    {% for article in articles %}
    <li class="article">
        <h2>{{ article.get_name() }}</h2>
        <p>{{ article.get_text() }}</p>
        <a href="articles/{{article.get_id()}}">Подробнее</a>
    </li>
    <hr>
    {% endfor %}
</ul>

<style>
    ul {
        display: flex;
        gap: 20px;
        list-style: none;
        padding: 0;
    }

    .article {
        width: 20vw;
        border: 1px solid #ddd;
        padding: 15px;
        border-radius: 8px;
        background: #f9f9f9;
    }

    hr {
        margin: 0;
    }
</style>
